name: CI and Deploy to Render

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies (API only)
        run: |
          cd packages/api
          npm install --omit=dev  # Install only production dependencies

      - name: Build TypeScript (API only)
        run: |
          cd packages/api
          npm run build  # Generates `packages/api/build/`

      - name: Install Google Chrome for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Copy dependencies and Chrome binary into build folder
        run: |
          mkdir -p packages/api/build/node_modules
          cp -r packages/api/node_modules/* packages/api/build/node_modules/
          cp packages/api/package.json packages/api/build/
          
          mkdir -p packages/api/build/chrome
          cp -r /usr/bin/google-chrome-stable packages/api/build/chrome/
          cp -r /opt/google/chrome packages/api/build/chrome/ || true  # Ignore if not found

      - name: Commit and push prebuilt files to main branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout main
          git add packages/api/build/
          git commit -m "Prebuilt API files for Render deployment"
          git push origin main --force

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'  # Only run this on `main`
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"  # Trigger Render deploy using the secret URL
