name: Deploy Prebuilt Files to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual deployment trigger

permissions:
  contents: write  # Needed to push built files

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Ensures write access

      - name: Set up Git user
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies (without saving node_modules)
        run: |
          cd packages/api
          npm install --omit=dev  # Installs only production dependencies

      - name: Build API
        run: |
          cd packages/api
          npm run build  # Generates `packages/api/build/`

      - name: Copy node_modules to build folder
        run: |
          cp -r packages/api/node_modules packages/api/build/

      - name: Commit & Push Build Files
        run: |
          git add packages/api/build
          git diff --staged --quiet || (git commit -m "Update API build" && git push origin main)

      - name: Deploy to Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
               -H "Authorization: Bearer $RENDER_API_KEY" \
               -H "Accept: application/json" \
               -H "Content-Type: application/json" \
               -d '{}'
              -d '{}'
