name: Deploy Prebuilt Files to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 👈 Allows manual runs from GitHub UI

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd packages/api
          npm install --omit=dev
          cp -R node_modules build/  # Copy node_modules to build/

      - name: Build API
        run: |
          cd packages/api
          npm run build

      - name: Commit & Push Build
        run: |
          git add packages/api/build
          git diff --staged --quiet || (git commit -m "Update API build" && git push origin main)

      - name: Deploy to Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
               -H "Authorization: Bearer $RENDER_API_KEY" \
               -H "Accept: application/json" \
               -H "Content-Type: application/json" \
               -d '{}'
