name: Deploy Prebuilt Files to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # Needed for pushing commits (without node_modules)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies (API only)
        run: |
          cd packages/api
          npm install --omit=dev  # Install only production dependencies

      - name: Install Google Chrome for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Build TypeScript (API only)
        run: |
          cd packages/api
          npm run build  # Generates `packages/api/build/`

      - name: Copy dependencies into build folder (without committing)
        run: |
          mkdir -p packages/api/build/node_modules
          cp -r packages/api/node_modules/* packages/api/build/node_modules/
          cp packages/api/package.json packages/api/build/

      - name: Copy Google Chrome binary to build folder
        run: |
          mkdir -p packages/api/build/chrome
          cp -r /usr/bin/google-chrome-stable packages/api/build/chrome/
          cp -r /opt/google/chrome packages/api/build/chrome/ || true  # Ignore if not found

      - name: Deploy to Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
               -H "Authorization: Bearer $RENDER_API_KEY" \
               -H "Accept: application/json" \
               -H "Content-Type: application/json" \
               --data '{}'
