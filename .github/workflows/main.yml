name: Build and Deploy Prebuilt Files to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # Needed for pushing commits (without node_modules)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd packages/api
          npm install  # This installs the dependencies in the GitHub Actions environment

      - name: Build TypeScript (API only)
        run: |
          cd packages/api
          npm run build  # Generates `packages/api/build/`

      - name: Copy prebuilt API files to build folder
        run: |
          mkdir -p packages/api/build/node_modules
          cp -r packages/api/node_modules/* packages/api/build/node_modules/
          cp packages/api/package.json packages/api/build/

      - name: Copy Google Chrome binary to build folder
        run: |
          mkdir -p packages/api/build/chrome
          cp -r /usr/bin/google-chrome-stable packages/api/build/chrome/

      - name: Push build to GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "Prebuilt API files for Render deployment"
          git push origin main

      - name: Deploy to Render
        # Only run this step if the branch is main
        if: github.ref == 'refs/heads/main'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"  # Trigger Render deploy
